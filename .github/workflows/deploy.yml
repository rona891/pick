name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (git pull + rebuild)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -q
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 "$VPS_USER@$VPS_HOST" "
            set -e
            cd /srv/picking
            GIT_TERMINAL_PROMPT=0 git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.vps.yml up --build -d --remove-orphans
            docker image prune -f
            for i in \$(seq 1 6); do
              if curl -sf http://localhost:8080/health > /dev/null; then
                echo 'Health check passed'; exit 0
              fi
              echo \"Waiting (\$i/6)...\"; sleep 5
            done
            echo 'Health check failed' && exit 1
          "
