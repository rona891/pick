services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: picking
      POSTGRES_USER: picking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U picking"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - picking_net

  backend:
    build: ./backend
    env_file:
      - ./backend/.env.prod
    volumes:
      - /srv/picking/data:/data:ro
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - picking_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
    networks:
      - picking_net

networks:
  picking_net:
    driver: bridge

volumes:
  postgres_data:
