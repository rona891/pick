<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Picking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=8" />
</head>
<body>

  <!-- ── Login ─────────────────────────────────────────────────────────── -->
  <div id="login-view" class="hidden">
    <div class="login-box">
      <div class="login-title">PICKING</div>
      <div class="login-sub">Sistema de gestión de almacén</div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <button type="submit" id="login-btn" class="btn-primary">Entrar</button>
      </form>
    </div>
  </div>

  <!-- ── App ───────────────────────────────────────────────────────────── -->
  <div id="app-view" class="hidden">

    <div class="topbar">
      <div class="app-title">PICKING</div>
      <div class="topbar-actions">
        <button id="change-pw-btn" class="btn-logout">Contraseña</button>
        <button id="logout-btn" class="btn-logout">Salir</button>
      </div>
    </div>

    <!-- Selector de semana -->
    <div class="semana-row">
      <label for="semana-select">Semana</label>
      <select id="semana-select" class="semana-select">
        <option value="">Sin semanas cargadas</option>
      </select>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card completed">
        <div class="stat-value" id="stat-completed">—</div>
        <div class="stat-label">Completados</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-value" id="stat-pending">—</div>
        <div class="stat-label">Pendientes</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="pick">Pick</button>
      <button class="tab-btn" data-tab="clientes">Clientes</button>
      <button class="tab-btn" data-tab="admin">Admin</button>
    </div>

    <!-- ── Panel: Pick ──────────────────────────────────────────────── -->
    <div class="tab-panel" data-panel="pick">
      <form id="search-form">
        <div class="search-row">
          <input type="text" id="barcode-input" placeholder="Código de barras..." autocomplete="off" />
          <button type="button" id="scan-btn" class="btn-icon">Escanear</button>
          <button type="submit" class="btn-search">Buscar</button>
        </div>
      </form>

      <div class="descrip-search-wrap">
        <input type="text" id="descrip-input" placeholder="Buscar por descripción..." autocomplete="off" />
        <div id="descrip-results" class="descrip-results hidden"></div>
      </div>

      <div id="scanner-container" class="hidden">
        <video id="scanner-video" autoplay muted playsinline></video>
        <button class="btn-scanner-close" onclick="stopScanner()">✕</button>
        <div class="scanner-controls">
          <button id="switch-camera-btn" class="btn-switch-camera hidden" onclick="switchCamera()">⟳ Cambiar cámara</button>
        </div>
        <div id="focus-indicator" class="focus-indicator hidden"></div>
      </div>

      <div id="results"></div>
    </div>

    <!-- ── Panel: Clientes ──────────────────────────────────────────── -->
    <div class="tab-panel hidden" data-panel="clientes">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="completo">Completo</button>
        <button class="filter-btn" data-filter="incompleto">Incompleto</button>
        <button class="filter-btn" data-filter="pendiente">Pendiente</button>
      </div>
      <div id="resumen-list"></div>
    </div>

    <!-- ── Panel: Admin ─────────────────────────────────────────────── -->
    <div class="tab-panel hidden" data-panel="admin">

      <!-- Lock screen -->
      <div id="admin-lock">
        <form id="admin-unlock-form" class="admin-lock-form">
          <label>Contraseña de administrador</label>
          <input type="password" id="admin-password" placeholder="••••••••" required />
          <button type="submit" class="btn-primary">Acceder</button>
        </form>
      </div>

      <!-- Admin panel -->
      <div id="admin-panel" class="hidden">

        <!-- Sub-tabs -->
        <div class="admin-tabs">
          <button class="admin-tab-btn active" data-admin-tab="clientes">Clientes</button>
          <button class="admin-tab-btn" data-admin-tab="nueva-semana">Nueva Semana</button>
        </div>

        <!-- Sub-panel: Clientes -->
        <div class="admin-tab-panel" data-admin-panel="clientes">
          <div class="admin-header">
            <button id="btn-nuevo-cliente" class="btn-search">+ Nuevo cliente</button>
          </div>
          <div class="table-wrap">
            <table class="clientes-table">
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Localidad</th>
                  <th>Teléfono</th>
                  <th>Contacto</th>
                  <th>Vendedor</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="clientes-tbody"></tbody>
            </table>
          </div>
        </div>

        <!-- Sub-panel: Nueva Semana -->
        <div class="admin-tab-panel hidden" data-admin-panel="nueva-semana">
          <div class="form-group">
            <label>Nombre del pick</label>
            <input type="text" id="semana-nombre" placeholder="Ej: PICK 30-04-2026" autocomplete="off" />
          </div>
          <div class="fecha-row">
            <div class="form-group">
              <label>Fecha desde</label>
              <input type="date" id="semana-fecha-desde" />
            </div>
            <div class="form-group">
              <label>Fecha hasta</label>
              <input type="date" id="semana-fecha-hasta" />
            </div>
          </div>
          <p class="admin-section-desc">
            Seleccioná los archivos <strong>.db</strong> exportados de la app Yaguar (uno por vendedor).
          </p>
          <input type="file" id="db-file-input" accept=".db" multiple class="hidden" />
          <label for="db-file-input" class="btn-upload">Seleccionar archivos .db</label>
          <div id="upload-file-list" class="upload-file-list"></div>
          <button id="btn-importar-semana" class="btn-primary" style="margin-top:16px" disabled>
            Importar picks
          </button>
          <div id="import-result" class="import-result hidden"></div>
        </div>

      </div>

    </div>

  </div>

  <!-- ── Modal cambiar contraseña ─────────────────────────────────────── -->
  <div id="pw-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>Cambiar contraseña</span>
        <button id="pw-modal-close" class="modal-close">✕</button>
      </div>
      <form id="pw-form" style="padding:20px;display:flex;flex-direction:column;gap:0">
        <div class="form-group">
          <label>Contraseña actual</label>
          <input type="password" id="pw-current" required />
        </div>
        <div class="form-group">
          <label>Contraseña nueva</label>
          <input type="password" id="pw-new" required minlength="8" />
        </div>
        <div class="form-group">
          <label>Repetir contraseña nueva</label>
          <input type="password" id="pw-confirm" required minlength="8" />
        </div>
        <button type="submit" class="btn-primary">Guardar</button>
      </form>
    </div>
  </div>

  <!-- ── Modal cliente ─────────────────────────────────────────────────── -->
  <div id="cliente-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span id="modal-title">Nuevo cliente</span>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <form id="cliente-form">
        <div class="form-group"><label>Nombre</label><input type="text" id="cf-nombre" required /></div>
        <div class="form-group"><label>Localidad</label><input type="text" id="cf-localidad" /></div>
        <div class="form-group"><label>Dirección</label><input type="text" id="cf-direccion" /></div>
        <div class="form-group"><label>Teléfono</label><input type="text" id="cf-telefono" /></div>
        <div class="form-group"><label>Contacto</label><input type="text" id="cf-contacto" /></div>
        <div class="form-group"><label>Vendedor</label><input type="text" id="cf-vendedor" /></div>
        <button type="submit" class="btn-primary">Guardar</button>
      </form>
    </div>
  </div>

  <!-- ── Bottom sheet: picks de un cliente ───────────────────────────────── -->
  <div id="cliente-picks-overlay" class="modal-overlay hidden cliente-picks-overlay">
    <div class="cliente-picks-sheet">
      <div class="modal-header">
        <span id="cliente-picks-title"></span>
        <button id="cliente-picks-close" class="modal-close">✕</button>
      </div>
      <div id="cliente-picks-content" class="cliente-picks-content"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script src="js/api.js?v=8"></script>
  <script src="js/app.js?v=8"></script>
</body>
</html>
