<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── Login ─────────────────────────────────────────────────────────── -->
  <div id="login-view" class="hidden">
    <div class="login-box">
      <div class="login-title">PICKING</div>
      <div class="login-sub">Sistema de gestión de almacén</div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <button type="submit" id="login-btn" class="btn-primary">Entrar</button>
      </form>
    </div>
  </div>

  <!-- ── App ───────────────────────────────────────────────────────────── -->
  <div id="app-view" class="hidden">

    <div class="topbar">
      <div class="app-title">PICKING</div>
      <div class="topbar-actions">
        <button id="change-pw-btn" class="btn-logout">Contraseña</button>
        <button id="logout-btn" class="btn-logout">Salir</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card completed">
        <div class="stat-value" id="stat-completed">—</div>
        <div class="stat-label">Completados</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-value" id="stat-pending">—</div>
        <div class="stat-label">Pendientes</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="pick">Pick</button>
      <button class="tab-btn" data-tab="clientes">Clientes</button>
      <button class="tab-btn" data-tab="admin">Admin</button>
    </div>

    <!-- ── Panel: Pick ──────────────────────────────────────────────── -->
    <div class="tab-panel" data-panel="pick">
      <form id="search-form">
        <div class="search-row">
          <input type="text" id="barcode-input" placeholder="Código de barras..." autocomplete="off" />
          <button type="button" id="scan-btn" class="btn-icon">Escanear</button>
          <button type="submit" class="btn-search">Buscar</button>
        </div>
      </form>

      <div id="scanner-container" class="hidden">
        <video id="scanner-video" autoplay muted playsinline></video>
      </div>

      <div id="results"></div>
    </div>

    <!-- ── Panel: Clientes ──────────────────────────────────────────── -->
    <div class="tab-panel hidden" data-panel="clientes">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="completo">Completo</button>
        <button class="filter-btn" data-filter="incompleto">Incompleto</button>
        <button class="filter-btn" data-filter="pendiente">Pendiente</button>
      </div>
      <div id="resumen-list"></div>
    </div>

    <!-- ── Panel: Admin ─────────────────────────────────────────────── -->
    <div class="tab-panel hidden" data-panel="admin">

      <!-- Lock screen -->
      <div id="admin-lock">
        <form id="admin-unlock-form" class="admin-lock-form">
          <label>Contraseña de administrador</label>
          <input type="password" id="admin-password" placeholder="••••••••" required />
          <button type="submit" class="btn-primary">Acceder</button>
        </form>
      </div>

      <!-- Admin panel -->
      <div id="admin-panel" class="hidden">
        <div class="admin-header">
          <span class="section-title">Clientes</span>
          <button id="btn-nuevo-cliente" class="btn-search">+ Nuevo</button>
        </div>
        <div class="table-wrap">
          <table class="clientes-table">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Localidad</th>
                <th>Teléfono</th>
                <th>Contacto</th>
                <th>Vendedor</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="clientes-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>

  </div>

  <!-- ── Modal cambiar contraseña ─────────────────────────────────────── -->
  <div id="pw-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>Cambiar contraseña</span>
        <button id="pw-modal-close" class="modal-close">✕</button>
      </div>
      <form id="pw-form" style="padding:20px;display:flex;flex-direction:column;gap:0">
        <div class="form-group">
          <label>Contraseña actual</label>
          <input type="password" id="pw-current" required />
        </div>
        <div class="form-group">
          <label>Contraseña nueva</label>
          <input type="password" id="pw-new" required minlength="8" />
        </div>
        <div class="form-group">
          <label>Repetir contraseña nueva</label>
          <input type="password" id="pw-confirm" required minlength="8" />
        </div>
        <button type="submit" class="btn-primary">Guardar</button>
      </form>
    </div>
  </div>

  <!-- ── Modal cliente ─────────────────────────────────────────────────── -->
  <div id="cliente-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span id="modal-title">Nuevo cliente</span>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <form id="cliente-form">
        <div class="form-group"><label>Nombre</label><input type="text" id="cf-nombre" required /></div>
        <div class="form-group"><label>Localidad</label><input type="text" id="cf-localidad" /></div>
        <div class="form-group"><label>Dirección</label><input type="text" id="cf-direccion" /></div>
        <div class="form-group"><label>Teléfono</label><input type="text" id="cf-telefono" /></div>
        <div class="form-group"><label>Contacto</label><input type="text" id="cf-contacto" /></div>
        <div class="form-group"><label>Vendedor</label><input type="text" id="cf-vendedor" /></div>
        <button type="submit" class="btn-primary">Guardar</button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
