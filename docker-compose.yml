services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: picking
      POSTGRES_USER: picking
      POSTGRES_PASSWORD: picking_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U picking"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - C:\Claude\archivosX:/data:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__
            - "*.pyc"
            - Dockerfile
        - action: rebuild
          path: ./backend/requirements.txt

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /usr/share/nginx/html
          ignore:
            - Dockerfile
            - nginx.conf
        - action: rebuild
          path: ./frontend/nginx.conf
        - action: rebuild
          path: ./frontend/Dockerfile

volumes:
  postgres_data:
