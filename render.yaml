services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: pick-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pick-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: FRONTEND_URL
        value: https://pick-frontend.onrender.com
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: pick-frontend
    env: static
    buildCommand: sed -i "s|window.PICK_API_BASE = '';|window.PICK_API_BASE = 'https://pick-backend.onrender.com';|" frontend/index.html
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: pick-db
    databaseName: picking
    user: picking
    plan: free
